runner_cfg:
  seed: 27
  output_dir: results
  optimizer_and_scheduler_cfg:
    param_dict_cfg:
      lr_prompt_learner_context: 0.0001
      lr_prompt_learner_ranks: 0.0001
      lr_image_encoder: 0.0001
      lr_text_encoder: 0.0
      lr_logit_scale: 0.0
      staged_lr_image_encoder:
        new_layers: []
        base_lr_mult: 1.0
        new_lr_mult: 1.0
    optimizer_cfg:
      optimizer_name: radam
      lr: 0.0001
      weight_decay: 0.0005
      momentum: 0.9
      sgd_dampening: 0.0
      sgd_nesterov: false
      rmsprop_alpha: 0.99
      adam_beta1: 0.9
      adam_beta2: 0.999
      staged_lr: null
      lookahead: false
    lr_scheduler_cfg:
      lr_scheduler_name: cosine
      stepsize:
      - 60
      gamma: 0.1
      max_epochs: 100
      warmup_epoch: 0
      warmup_cons_lr: 1.0e-05
      warmup_min_lr: 1.0e-05
      warmup_type: constant
      warmup_recount: true
  load_weights_cfg:
    init_model_weights: null
    init_prompt_learner_weights: null
    init_image_encoder_weights: null
    init_text_encoder_weights: null
  loss_weights:
    ce_loss: 1.0
    kl_loss: 1.0
  model_cfg:
    type: FluoCLIP
    prompt_learner_cfg:
      type: Stain2stgEmbedPromptLearner
      num_ranks: 10
      num_base_ranks: 3
      num_tokens_per_rank: 1
      num_context_tokens: 10
      rank_tokens_position: tail
      init_rank_path: null
      init_context: 'This is a fluorescence microscopy image stained with '
      rank_specific_context: false
      interpolation_type: linear
      stain_tokens_position: tail
      init_stain_path: data/fluo_stains.yaml
      stain_embed_cfg:
        stain_embed_type: mlp
        summary_type: query_attention
        num_queries: 2
      interpolation_rank: base
      num_rank_context_tokens: 10
    text_encoder_name: RN50
    image_encoder_name: RN50
    adapter_cfg:
      type: AttentionAdapter
    stage2_use: true
data_cfg:
  train_images_root: /data/root
  val_images_root: /data/root
  test_images_root: /data/root
  train_data_file: data/data_info_ver3_train_stain.txt
  val_data_file: data/data_info_ver3_val_stain.txt
  test_data_file: data/data_info_ver3_val_stain.txt
  few_shot:
    num_shots: 0
  label_distributed_shift:
    num_topk_scaled_class: 0
    scale_factor: 1.0
  use_long_tail: false
  transforms_cfg:
    input_transforms:
    - random_resized_crop
    - random_hflip
    - largest_channel
    - normalize
    input_resize:
    - 256
    - 256
    input_size:
    - 224
    - 224
    pixel_mean:
    - 0.485
    - 0.456
    - 0.406
    pixel_std:
    - 0.229
    - 0.224
    - 0.225
  train_dataloder_cfg:
    num_workers: 4
    batch_size: 32
    shuffle: true
  eval_dataloder_cfg:
    num_workers: 4
    batch_size: 80
    shuffle: false
trainer_cfg:
  max_epochs: 100
  precision: 16
  accelerator: gpu
  devices: 1
  check_val_every_n_epoch: 1
  num_sanity_val_steps: 1
  fast_dev_run: false
test_only: false
ckpt_path: None
resume:
  stage_num: null
  ckpt_path: null
stage2_cfg:
  max_epochs: 100
  optimizer_and_scheduler_cfg:
    param_dict_cfg:
      lr_prompt_learner_context: 0.0001
      lr_prompt_learner_ranks: 0.0001
      lr_prompt_learner_stains: 0.0
      lr_prompt_learner_rank_context: 0.0001
      lr_module_adapter: 0.0
      lr_prompt_learner_stainembed: 1.0e-05
stage1_cfg:
  optimizer_and_scheduler_cfg:
    param_dict_cfg:
      lr_prompt_learner_context: 0.0
      lr_prompt_learner_ranks: 0.0
      lr_prompt_learner_stains: 0.0001
      lr_prompt_learner_rank_context: 0.0
      lr_image_encoder: 0.0
      lr_module_adapter: 1.0e-05
  max_epochs: 10
config:
- config.yaml
